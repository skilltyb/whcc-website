<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WHCC App – QR Code</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5f0e8;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Lato', sans-serif;
  }

  .card {
    background: #1a2b1f;
    color: #fff;
    border-radius: 16px;
    padding: 48px 40px 40px;
    text-align: center;
    max-width: 380px;
    width: 90%;
    box-shadow: 0 8px 40px rgba(0,0,0,0.25);
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 200px; height: 200px;
    background: rgba(196,160,80,0.08);
    border-radius: 50%;
  }

  .card::after {
    content: '';
    position: absolute;
    bottom: -80px; left: -40px;
    width: 240px; height: 240px;
    background: rgba(196,160,80,0.05);
    border-radius: 50%;
  }

  .logo-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 6px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    border: 2px solid #c4a050;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: #c4a050;
    flex-shrink: 0;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.02em;
    line-height: 1.2;
  }

  .subtitle {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #c4a050;
    margin-top: 4px;
    margin-bottom: 32px;
  }

  .qr-wrap {
    background: #fff;
    border-radius: 12px;
    padding: 16px;
    display: inline-block;
    margin-bottom: 28px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }

  .qr-wrap img {
    display: block;
    width: 220px;
    height: 220px;
  }

  .cta {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: #c4a050;
    margin-bottom: 6px;
  }

  .instructions {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    line-height: 1.6;
    margin-bottom: 24px;
  }

  .url {
    font-size: 10px;
    color: rgba(255,255,255,0.3);
    word-break: break-all;
    letter-spacing: 0.03em;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: #c4a050;
    margin: 20px auto;
    opacity: 0.4;
  }

  .features {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 20px;
  }

  .feature {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .feature-icon {
    font-size: 18px;
  }

  .feature-label {
    font-size: 10px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  @media print {
    body { background: white; }
    .card { box-shadow: none; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo-line">
    <div class="logo-icon">⛳</div>
    <h1>Westwood Hills<br>Country Club</h1>
  </div>
  <p class="subtitle">Member &amp; Staff Portal</p>

  <div class="qr-wrap">
    <img
      src="https://api.qrserver.com/v1/create-qr-code/?size=440x440&margin=0&color=1a2b1f&bgcolor=ffffff&data=https%3A%2F%2Fcerulean-klepon-c373b2.netlify.app"
      alt="QR Code for WHCC App"
    >
  </div>

  <p class="cta">Scan to open the app</p>
  <p class="instructions">
    Point your phone camera at the code.<br>
    Tap the link, then choose<br>
    <strong style="color:#fff">Add to Home Screen</strong> to install.
  </p>

  <div class="features">
    <div class="feature">
      <span class="feature-icon">🎾</span>
      <span class="feature-label">Court Booking</span>
    </div>
    <div class="feature">
      <span class="feature-icon">🍽️</span>
      <span class="feature-label">Dining</span>
    </div>
    <div class="feature">
      <span class="feature-icon">📅</span>
      <span class="feature-label">Events</span>
    </div>
  </div>

  <div class="divider"></div>
  <p class="url">cerulean-klepon-c373b2.netlify.app</p>
</div>
</body>
</html>
