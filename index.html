<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Westwood Hills Country Club — Poplar Bluff, Missouri</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --forest:#1a2b1f;--deep:#111a14;--gold:#b8976a;--gold-lt:#d4b483;
  --cream:#f5f0e8;--sand:#e8dfc8;--mid:#2e4233;--text:#2a1f14;--muted:#7a6e5f;
}
html{scroll-behavior:smooth}
body{font-family:'Raleway',sans-serif;background:var(--cream);color:var(--text);overflow-x:hidden}
/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:72px;background:rgba(17,26,20,0.96);backdrop-filter:blur(12px);border-bottom:1px solid rgba(184,151,106,0.2);transition:background .3s}
.nav-logo{display:flex;align-items:center;gap:14px;text-decoration:none;cursor:pointer}
.nav-emblem{width:42px;height:42px;border:1.5px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--gold);font-weight:600;flex-shrink:0}
.nav-wordmark{font-family:'Cormorant Garamond',serif;color:var(--cream);font-size:14px;letter-spacing:.18em;text-transform:uppercase;line-height:1.3}
.nav-wordmark span{display:block;font-size:10px;color:var(--gold);letter-spacing:.3em}
.nav-links{display:flex;gap:32px;list-style:none}
.nav-links a{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:rgba(245,240,232,.75);text-decoration:none;cursor:pointer;transition:color .2s;padding-bottom:2px;border-bottom:2px solid transparent}
.nav-links a:hover,.nav-links a.active{color:var(--gold-lt);border-bottom-color:var(--gold-lt)}
.nav-cta{font-size:11px;letter-spacing:.15em;text-transform:uppercase;background:transparent;border:1px solid var(--gold);color:var(--gold);padding:9px 22px;cursor:pointer;transition:all .25s;font-family:'Raleway',sans-serif}
.nav-cta:hover{background:var(--gold);color:var(--deep)}
.nav-hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px}
.nav-hamburger span{display:block;width:22px;height:1.5px;background:var(--cream);transition:all .3s}
.nav-mobile{display:none;position:fixed;top:72px;left:0;right:0;background:var(--deep);z-index:190;padding:24px 40px;border-bottom:1px solid rgba(184,151,106,.15)}
.nav-mobile.open{display:block}
.nav-mobile ul{list-style:none;display:flex;flex-direction:column;gap:18px}
.nav-mobile a{font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:rgba(245,240,232,.8);text-decoration:none;cursor:pointer}
/* ── PAGE WRAPPER ── */
#app{padding-top:72px}
.page{display:none}.page.active{display:block}
/* ── FADE TRANSITION ── */
.page-enter{animation:fadeIn .4s ease forwards}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
/* ── SCROLL FADE ── */
.fade-up{opacity:0;transform:translateY(28px);transition:opacity .65s ease,transform .65s ease}
.fade-up.visible{opacity:1;transform:translateY(0)}
.d1{transition-delay:.1s}.d2{transition-delay:.2s}.d3{transition-delay:.3s}.d4{transition-delay:.4s}
/* ── SHARED TYPOGRAPHY ── */
.eyebrow{font-size:10px;letter-spacing:.35em;text-transform:uppercase;color:var(--gold);margin-bottom:18px;display:flex;align-items:center;gap:14px}
.eyebrow::after{content:'';max-width:40px;height:1px;background:var(--gold);flex:1}
.eyebrow.lt{color:var(--gold-lt)}.eyebrow.lt::after{background:var(--gold-lt)}
.sec-title{font-family:'Cormorant Garamond',serif;font-size:clamp(32px,3.5vw,50px);font-weight:400;line-height:1.1;color:var(--forest);margin-bottom:22px}
.sec-title em{font-style:italic;color:var(--gold)}
.sec-title.light{color:var(--cream)}
.sec-body{font-size:14px;line-height:1.9;color:var(--muted);margin-bottom:24px;max-width:560px}
.sec-body.full{max-width:100%}
/* ── BUTTONS ── */
.btn-p{font-family:'Raleway',sans-serif;font-size:11px;letter-spacing:.2em;text-transform:uppercase;background:var(--gold);color:var(--deep);border:none;padding:15px 34px;cursor:pointer;transition:all .25s;display:inline-block;text-decoration:none}
.btn-p:hover{background:var(--gold-lt)}
.btn-g{font-family:'Raleway',sans-serif;font-size:11px;letter-spacing:.2em;text-transform:uppercase;background:transparent;color:var(--forest);border:1px solid rgba(26,43,31,.35);padding:14px 34px;cursor:pointer;transition:all .25s;display:inline-block}
.btn-g:hover{border-color:var(--gold);color:var(--gold)}
.btn-g.lt{color:var(--cream);border-color:rgba(245,240,232,.35)}.btn-g.lt:hover{border-color:var(--gold-lt);color:var(--gold-lt)}
/* ── SECTION WRAPPER ── */
.section{padding:88px 80px}
.section.dark{background:var(--forest)}
.section.sand{background:var(--sand)}
.section.deep{background:var(--deep)}
/* ── MARQUEE ── */
.marquee-band{background:var(--gold);overflow:hidden;padding:13px 0;white-space:nowrap}
.marquee-inner{display:inline-block;animation:marquee 30s linear infinite}
.mi{display:inline-block;font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--deep);margin:0 28px}
.md{display:inline-block;width:4px;height:4px;background:var(--deep);border-radius:50%;vertical-align:middle;margin:0 4px}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
/* ── PAGE HERO ── */
.page-hero{position:relative;height:420px;display:flex;align-items:flex-end;overflow:hidden}
.ph-bg{position:absolute;inset:0}
.ph-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(17,26,20,.25) 0%,rgba(17,26,20,.78) 100%)}
.ph-content{position:relative;z-index:2;padding:0 80px 52px;width:100%}
.ph-tag{display:inline-block;font-size:10px;letter-spacing:.35em;text-transform:uppercase;color:var(--gold);margin-bottom:14px;padding-left:44px;position:relative}
.ph-tag::before{content:'';position:absolute;left:0;top:50%;width:32px;height:1px;background:var(--gold)}
.ph-title{font-family:'Cormorant Garamond',serif;font-size:clamp(38px,5vw,68px);font-weight:300;color:var(--cream);line-height:.97}
.ph-title em{font-style:italic;color:var(--gold-lt)}
.ph-sub{margin-top:14px;font-size:13px;letter-spacing:.07em;color:rgba(245,240,232,.65);max-width:460px;line-height:1.8}
.breadcrumb{background:var(--forest);padding:13px 80px;display:flex;align-items:center;gap:10px}
.breadcrumb span,.breadcrumb a{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:rgba(245,240,232,.4);text-decoration:none;cursor:pointer}
.breadcrumb a:hover{color:var(--gold)}
.bc-sep{color:rgba(184,151,106,.4);font-size:10px}
.bc-cur{color:var(--gold) !important}
/* ── FOOTER ── */
footer{background:var(--deep);padding:80px 80px 40px}
.footer-top{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr;gap:56px;padding-bottom:56px;border-bottom:1px solid rgba(184,151,106,.15)}
.footer-brand-logo{display:flex;align-items:center;gap:14px;margin-bottom:22px}
.footer-brand-text{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:400;color:var(--cream);line-height:1.2}
.footer-brand-text small{display:block;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);font-family:'Raleway',sans-serif;font-weight:400}
.footer-tagline{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:rgba(245,240,232,.38);line-height:1.7;max-width:240px}
.fcol-title{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:22px}
.flinks{list-style:none}
.flinks li{margin-bottom:11px}
.flinks a{font-size:13px;color:rgba(245,240,232,.48);text-decoration:none;cursor:pointer;transition:color .2s}
.flinks a:hover{color:var(--gold-lt)}
.fci{font-size:13px;color:rgba(245,240,232,.48);margin-bottom:10px;line-height:1.6}
.fci strong{display:block;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:rgba(245,240,232,.28);font-weight:400;margin-bottom:1px}
.footer-bottom{display:flex;justify-content:space-between;align-items:center;padding-top:32px}
.fcopy{font-size:11px;color:rgba(245,240,232,.22);letter-spacing:.04em}
/* ══════════════════════════════════════════
   HOME PAGE
══════════════════════════════════════════ */
.hero{position:relative;height:100vh;min-height:680px;display:flex;align-items:flex-end;overflow:hidden}
.hero-bg{position:absolute;inset:0;
  background:
    linear-gradient(to bottom,rgba(17,26,20,.35) 0%,rgba(17,26,20,.15) 40%,rgba(17,26,20,.75) 100%),
    url("images/hero-clubhouse.jpg") center/cover no-repeat}
.hero-year{position:absolute;right:80px;bottom:90px;font-family:'Cormorant Garamond',serif;font-size:140px;font-weight:300;line-height:1;color:rgba(184,151,106,.1);pointer-events:none;letter-spacing:-.05em}
.hero-content{position:relative;z-index:2;width:100%;padding:0 80px 96px}
.hero-tag{display:inline-block;font-size:10px;letter-spacing:.35em;text-transform:uppercase;color:var(--gold);margin-bottom:20px;padding-left:48px;position:relative}
.hero-tag::before{content:'';position:absolute;left:0;top:50%;width:36px;height:1px;background:var(--gold)}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(52px,7vw,96px);font-weight:300;color:var(--cream);line-height:.95;max-width:700px}
.hero-title em{font-style:italic;color:var(--gold-lt)}
.hero-sub{margin-top:24px;font-size:13px;letter-spacing:.12em;color:rgba(245,240,232,.65);max-width:380px;line-height:1.8}
.hero-actions{margin-top:44px;display:flex;gap:16px;align-items:center;flex-wrap:wrap}
/* home sections */
.intro{display:grid;grid-template-columns:1fr 1fr;min-height:72vh}
.intro-vis{position:relative;overflow:hidden;min-height:520px;display:flex;align-items:flex-end;padding:48px;
  background:linear-gradient(to top,rgba(17,26,20,.72) 0%,rgba(17,26,20,.2) 50%,rgba(17,26,20,.1) 100%),
  url("images/golf-carts-sunset.jpg") center 60%/cover}
.intro-vis::before{content:'';position:absolute;top:32px;left:32px;width:48px;height:48px;border-top:1.5px solid var(--gold);border-left:1.5px solid var(--gold)}
.intro-vis::after{content:'';position:absolute;bottom:32px;right:32px;width:48px;height:48px;border-bottom:1.5px solid var(--gold);border-right:1.5px solid var(--gold)}
.intro-vis-cap{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:rgba(245,240,232,.5);position:relative;z-index:2}
.intro-text{background:var(--cream);padding:80px 72px;display:flex;flex-direction:column;justify-content:center}
.stat-row{display:flex;gap:48px;margin-top:12px;padding-top:36px;border-top:1px solid rgba(26,43,31,.12)}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:300;color:var(--forest);line-height:1}
.stat-num sup{font-size:18px}
.stat-lbl{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-top:4px}
.amenities-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(184,151,106,.15);margin-top:56px}
.am-card{background:var(--deep);padding:44px 32px;position:relative;overflow:hidden;transition:background .3s;cursor:default}
.am-card:hover{background:var(--mid)}
.am-card:hover .am-line{width:40px}
.am-num{position:absolute;top:24px;right:24px;font-family:'Cormorant Garamond',serif;font-size:60px;font-weight:300;color:rgba(184,151,106,.06);line-height:1;pointer-events:none}
.am-line{width:24px;height:1.5px;background:var(--gold);margin-bottom:18px;transition:width .3s}
.am-name{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:400;color:var(--cream);margin-bottom:10px}
.am-desc{font-size:13px;line-height:1.8;color:rgba(245,240,232,.5)}
.course-strip{background:var(--sand);padding:96px 80px}
.cs-inner{display:grid;grid-template-columns:1.2fr 1fr;gap:80px;align-items:center}
.course-specs{margin-top:32px;display:grid;grid-template-columns:1fr 1fr;gap:20px}
.spec-item{padding:18px 22px;background:rgba(26,43,31,.07);border-left:2px solid var(--gold)}
.spec-val{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:400;color:var(--forest)}
.spec-key{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-top:2px}
.scorecard-mock{background:var(--forest);padding:32px}
.scorecard-mock table{width:100%;border-collapse:collapse;font-size:12px}
.scorecard-mock th{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);padding:0 8px 10px;text-align:center;border-bottom:1px solid rgba(184,151,106,.25)}
.scorecard-mock td{padding:8px;text-align:center;color:rgba(245,240,232,.75);border-bottom:1px solid rgba(255,255,255,.05)}
.scorecard-mock tr:last-child td{color:var(--gold-lt);font-weight:600}
.sc-title{font-family:'Cormorant Garamond',serif;font-size:15px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:18px;text-align:center}
.events-section{background:var(--cream);padding:96px 80px}
.events-layout{display:grid;grid-template-columns:1fr 2fr;gap:80px;margin-top:56px}
.event-item{display:grid;grid-template-columns:76px 1fr auto;align-items:center;gap:24px;padding:26px 0;border-bottom:1px solid rgba(26,43,31,.1)}
.event-item:first-child{border-top:1px solid rgba(26,43,31,.1)}
.ev-date-box{background:var(--forest);padding:10px;text-align:center;flex-shrink:0}
.ev-mo{font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:var(--gold)}
.ev-d{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--cream);line-height:1}
.ev-name{font-family:'Cormorant Garamond',serif;font-size:19px;color:var(--forest)}
.ev-sub{font-size:12px;color:var(--muted);margin-top:3px}
.ev-tag{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);border:1px solid var(--gold);padding:4px 10px;white-space:nowrap}
.dining-cta{position:relative;overflow:hidden;background:linear-gradient(to right,rgba(17,26,20,.97) 30%,rgba(17,26,20,.7) 100%),url("images/hoovers-table.jpg") center/cover;padding:112px 80px;display:flex;align-items:center;justify-content:space-between;gap:60px}
.dining-cta::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(to bottom,var(--gold),transparent)}
.mem-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:56px}
.mem-card{background:var(--cream);border:1px solid rgba(26,43,31,.12);padding:44px 32px;position:relative;transition:transform .3s,box-shadow .3s}
.mem-card:hover{transform:translateY(-5px);box-shadow:0 16px 50px rgba(26,43,31,.12)}
.mem-card.feat{background:var(--forest);border-color:var(--gold)}
.mem-badge{position:absolute;top:-11px;left:32px;background:var(--gold);color:var(--deep);font-size:9px;letter-spacing:.2em;text-transform:uppercase;padding:4px 12px}
.mem-type{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.mem-name{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:400;color:var(--forest);margin-bottom:14px;line-height:1}
.mem-card.feat .mem-name{color:var(--cream)}
.mem-desc{font-size:13px;line-height:1.8;color:var(--muted);margin-bottom:24px}
.mem-card.feat .mem-desc{color:rgba(245,240,232,.6)}
.mem-feats{list-style:none;margin-bottom:28px}
.mem-feat{font-size:13px;color:var(--muted);padding:6px 0;display:flex;align-items:flex-start;gap:10px;border-bottom:1px solid rgba(26,43,31,.07)}
.mem-feat:last-child{border-bottom:none}
.mem-feat::before{content:'';min-width:16px;height:1px;background:var(--gold);margin-top:10px;flex-shrink:0}
.mem-card.feat .mem-feat{color:rgba(245,240,232,.6)}
/* ══════════════════════════════════════════
   GOLF PAGE
══════════════════════════════════════════ */
.golf-bg{background:linear-gradient(to bottom,rgba(17,26,20,.25) 0%,rgba(17,26,20,.72) 100%),url("images/golf-hero.jpg") center 30%/cover}
.course-split{display:grid;grid-template-columns:1.1fr 1fr;gap:72px;align-items:start}
.tee-box{background:var(--forest);padding:36px}
.tee-box::before{content:'';display:block;width:40px;height:40px;border-top:1.5px solid var(--gold);border-left:1.5px solid var(--gold);margin-bottom:24px}
.tee-title{font-family:'Cormorant Garamond',serif;font-size:16px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:18px;font-style:italic}
.tee-row{display:grid;grid-template-columns:80px 1fr 72px;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(184,151,106,.1)}
.tee-lbl{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold)}
.tee-bar-w{height:6px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden}
.tee-bar{height:100%;border-radius:3px}
.tb-c{background:#1a5c8a;width:100%}.tb-b{background:#2980b9;width:90%}.tb-w{background:#bdc3c7;width:80%}.tb-g{background:var(--gold);width:68%}.tb-r{background:#c0392b;width:58%}
.tee-yds{font-family:'Cormorant Garamond',serif;font-size:19px;color:var(--cream);text-align:right}
.tee-stats{margin-top:24px;padding-top:20px;border-top:1px solid rgba(184,151,106,.15);display:grid;grid-template-columns:1fr 1fr 1fr;text-align:center;gap:12px}
.ts-num{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--cream)}
.ts-lbl{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-top:3px}
.scorecard-full{width:100%;border-collapse:collapse;min-width:680px;font-size:13px}
.scorecard-full th{background:var(--deep);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);padding:12px 8px;text-align:center;border:1px solid rgba(184,151,106,.1)}
.scorecard-full td{padding:9px 8px;text-align:center;color:rgba(245,240,232,.75);border:1px solid rgba(255,255,255,.04)}
.scorecard-full tr:nth-child(even) td{background:rgba(255,255,255,.02)}
.scorecard-full .total td{background:rgba(184,151,106,.1);color:var(--gold-lt);font-weight:600}
.hole-n{color:var(--gold);font-family:'Cormorant Garamond',serif;font-size:16px}
.feats3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:48px}
.feat-card{background:var(--deep);padding:36px 28px;border-top:2px solid var(--gold)}
.feat-icon{font-size:30px;margin-bottom:18px}
.feat-name{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--cream);margin-bottom:10px}
.feat-desc{font-size:13px;line-height:1.8;color:rgba(245,240,232,.55)}
/* ══════════════════════════════════════════
   DINING PAGE
══════════════════════════════════════════ */
.dining-bg{background:linear-gradient(to bottom,rgba(17,26,20,.2) 0%,rgba(17,26,20,.78) 100%),url("images/dining-hero.jpg") center/cover}
.menu-tabs{display:flex;gap:0;border-bottom:1px solid rgba(26,43,31,.12);margin-bottom:40px}
.menu-tab{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);padding:13px 26px;cursor:pointer;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:'Raleway',sans-serif;transition:all .2s}
.menu-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.menu-tab:hover{color:var(--forest)}
.menu-panel{display:none}.menu-panel.active{display:block}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 56px}
.menu-cat-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:21px;color:var(--forest);margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid rgba(184,151,106,.3)}
.menu-item{display:flex;justify-content:space-between;align-items:baseline;padding:9px 0;border-bottom:1px dotted rgba(26,43,31,.1);gap:14px}
.menu-item:last-child{border-bottom:none}
.mi-name{font-size:14px;color:var(--text)}.mi-desc{font-size:12px;color:var(--muted);margin-top:1px}
.mi-price{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--gold);flex-shrink:0}
.express-banner{display:flex;align-items:center;justify-content:center;gap:12px;background:var(--forest);color:#fff;padding:10px 28px;border-radius:28px;font-size:.85rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;width:fit-content;margin:0 auto 36px}
.express-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-top:0}
.express-card{background:#fff;border:1px solid rgba(26,43,31,.12);border-radius:10px;padding:28px 20px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px;box-shadow:0 2px 12px rgba(26,43,31,.06)}
.express-price{background:var(--forest);color:#fff;font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;padding:4px 20px;border-radius:20px;line-height:1.4}
.express-name{font-family:'Cormorant Garamond',serif;font-size:1.15rem;color:var(--dark);line-height:1.3}
.express-avail{font-size:.8rem;color:var(--muted);margin-top:24px;text-align:center}
.spaces-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:44px}
.space-card{background:var(--cream);border:1px solid rgba(26,43,31,.1);overflow:hidden}
.space-vis{height:180px;background:var(--forest);display:flex;align-items:center;justify-content:center}
.space-info{padding:22px 20px}
.space-name{font-family:'Cormorant Garamond',serif;font-size:21px;color:var(--forest);margin-bottom:4px}
.space-cap{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.space-desc{font-size:13px;line-height:1.7;color:var(--muted)}
.food-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:44px}
.food-img{aspect-ratio:1/1;overflow:hidden}
.food-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s ease}
.food-img:hover img{transform:scale(1.06)}
.food-img.wide{grid-column:span 2;aspect-ratio:auto}
.food-img.wide img{height:100%}
.golf-gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:44px}
.gg-img{overflow:hidden;aspect-ratio:4/3}
.gg-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s ease}
.gg-img:hover img{transform:scale(1.05)}
.gg-img.tall{grid-row:span 2;aspect-ratio:auto}
.gg-img.tall img{height:100%}
.hours-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;background:rgba(26,43,31,.1);margin-top:44px}
.hours-cell{background:var(--cream);padding:26px 28px}
.hc-day{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:7px}
.hc-time{font-family:'Cormorant Garamond',serif;font-size:21px;color:var(--forest)}
.hc-note{font-size:12px;color:var(--muted);margin-top:3px}
/* ── HOOVER'S ── */
.hoovers-intro{background:var(--deep);padding:96px 80px;text-align:center;position:relative;overflow:hidden}
.hoovers-intro::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(184,151,106,.06) 0%,transparent 70%)}
.hoovers-intro-text{position:relative;z-index:2}
.hoovers-brand{margin-bottom:8px}
.hoovers-rule{width:64px;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);margin:0 auto}
.hoovers-logotype{font-family:'Cormorant Garamond',serif;font-size:clamp(52px,6vw,88px);font-weight:300;color:var(--cream);letter-spacing:.06em;margin:16px 0 4px;line-height:1}
.hoovers-at{font-size:11px;letter-spacing:.35em;text-transform:uppercase;color:var(--gold);margin-bottom:16px}
.hoovers-hours-row{display:flex;align-items:center;justify-content:center;gap:28px;margin-top:36px;flex-wrap:wrap}
.hoovers-hour-item{text-align:center}
.hoovers-hour-day{display:block;font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.hoovers-hour-time{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--cream);font-weight:300}
.hoovers-hour-divider{width:1px;height:36px;background:rgba(184,151,106,.25)}
.hoovers-public-note{font-size:12px;color:rgba(245,240,232,.45);margin-top:28px;font-style:italic;letter-spacing:.03em}
.hoovers-public-note sup{font-size:9px}
.hoovers-menu-header{text-align:center;margin-bottom:48px}
.hoovers-menu-header .eyebrow{justify-content:center}
.hoovers-menu-header .eyebrow::after{display:none}
.hoovers-menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px 72px}
.hoovers-menu-grid .menu-item{border-bottom-style:solid;border-bottom-color:rgba(26,43,31,.06)}
.hoovers-menu-grid .mi-desc{max-width:400px}
.mi-wine{font-size:11px;font-style:italic;color:var(--gold);padding:0 0 12px;border-bottom:1px dotted rgba(26,43,31,.1);letter-spacing:.02em}
.hoovers-specialty{background:var(--deep);margin-top:64px;padding:52px 48px;text-align:center;position:relative}
.hoovers-spec-rule{width:48px;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);margin:0 auto}
.hoovers-spec-label{font-size:10px;letter-spacing:.35em;text-transform:uppercase;color:var(--gold);margin:20px 0 8px}
.hoovers-spec-name{font-family:'Cormorant Garamond',serif;font-size:clamp(28px,3.5vw,42px);font-weight:300;color:var(--cream);margin-bottom:14px;line-height:1.1}
.hoovers-spec-desc{font-size:14px;color:rgba(245,240,232,.55);line-height:1.8;max-width:480px;margin:0 auto}
.hoovers-spec-wine{font-size:11px;font-style:italic;color:var(--gold);margin-top:14px;margin-bottom:24px;letter-spacing:.02em}
/* ── HOOVER'S RESERVATION ── */
.hoovers-res-section{background:var(--forest);padding:96px 80px;position:relative;overflow:hidden}
.hoovers-res-section::before{content:'';position:absolute;top:0;right:0;width:40%;height:100%;background:radial-gradient(ellipse at 80% 30%,rgba(184,151,106,.05) 0%,transparent 70%);pointer-events:none}
.hoovers-res-inner{display:grid;grid-template-columns:1fr 1.15fr;gap:72px;align-items:start;position:relative;z-index:2}
.hoovers-res-title{font-family:'Cormorant Garamond',serif;font-size:clamp(32px,4vw,52px);font-weight:300;color:var(--cream);line-height:1.05;margin:24px 0 18px}
.hoovers-res-title em{font-style:italic;color:var(--gold-lt)}
.hoovers-res-body{font-size:14px;line-height:1.9;color:rgba(245,240,232,.5);max-width:400px;margin-bottom:32px}
.hoovers-res-details{display:flex;flex-direction:column;gap:16px;margin-bottom:32px}
.hoovers-res-detail{display:flex;flex-direction:column;gap:2px;padding-left:16px;border-left:2px solid var(--gold)}
.hoovers-res-detail-label{font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:var(--gold)}
.hoovers-res-detail-value{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--cream)}
.hoovers-res-note{font-size:12px;font-style:italic;color:rgba(245,240,232,.3);line-height:1.7;max-width:360px}
.hoovers-res-form{background:rgba(255,255,255,.03);border:1px solid rgba(184,151,106,.15);padding:40px 36px}
.hoovers-res-form-title{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--cream);margin-bottom:28px;font-style:italic}
.hrf-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.hrf-group{display:flex;flex-direction:column;gap:6px}
.hrf-label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold)}
.hrf-input,.hrf-select,.hrf-textarea{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(184,151,106,.2);color:var(--cream);padding:11px 14px;font-family:'Raleway',sans-serif;font-size:13px;outline:none;transition:border-color .2s}
.hrf-input:focus,.hrf-select:focus,.hrf-textarea:focus{border-color:var(--gold)}
.hrf-select option{background:var(--deep);color:var(--cream)}
.hrf-textarea{resize:vertical;min-height:72px}
.hrf-input::placeholder,.hrf-textarea::placeholder{color:rgba(245,240,232,.25)}
.hrf-fine{font-size:11px;color:rgba(245,240,232,.28);margin-top:14px;text-align:center;line-height:1.6}
/* ── CUSTOM DATE PICKER ── */
.hrf-date-display{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(184,151,106,.2);color:var(--cream);padding:11px 14px;font-family:'Raleway',sans-serif;font-size:13px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:border-color .2s;user-select:none}
.hrf-date-display:hover{border-color:var(--gold)}
.hrf-date-display.disabled{opacity:.4;pointer-events:none}
.hrf-date-arrow{font-size:10px;color:var(--gold);margin-left:8px}
.hrf-cal{display:none;position:absolute;top:100%;left:0;right:0;z-index:50;background:var(--deep);border:1px solid rgba(184,151,106,.25);padding:16px;margin-top:4px;box-shadow:0 12px 40px rgba(0,0,0,.4)}
.hrf-cal.open{display:block}
.hrf-cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.hrf-cal-month{font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--cream);letter-spacing:.04em}
.hrf-cal-arrow{background:none;border:1px solid rgba(184,151,106,.25);color:var(--gold);width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:all .2s;font-family:sans-serif;line-height:1}
.hrf-cal-arrow:hover{border-color:var(--gold);background:rgba(184,151,106,.1)}
.hrf-cal-head{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;margin-bottom:6px}
.hrf-cal-head span{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);padding:4px 0}
.hrf-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;gap:2px}
.hrf-cal-day{font-size:13px;padding:8px 4px;color:rgba(245,240,232,.2);cursor:default;border:1px solid transparent;transition:all .15s;font-family:'Raleway',sans-serif}
.hrf-cal-day.available{color:var(--cream);cursor:pointer}
.hrf-cal-day.available:hover{background:rgba(184,151,106,.15);border-color:rgba(184,151,106,.3)}
.hrf-cal-day.selected{background:var(--gold);color:var(--deep);font-weight:600}
.hrf-cal-day.today{border-color:rgba(184,151,106,.35)}
.hrf-cal-day.empty{visibility:hidden}
.hrf-date-hint{font-size:11px;color:var(--gold);margin-bottom:14px;font-style:italic;min-height:16px;opacity:.7}
.hrf-error{font-size:12px;color:#e07070;margin:8px 0;min-height:0;transition:all .3s}
.hrf-venue-toggle{display:flex;gap:8px}
.hrf-venue-btn{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(184,151,106,.15);padding:12px 14px;cursor:pointer;text-align:left;transition:all .2s;font-family:'Raleway',sans-serif}
.hrf-venue-btn.active{background:rgba(184,151,106,.12);border-color:var(--gold)}
.hrf-venue-btn:hover{border-color:rgba(184,151,106,.4)}
.hrf-venue-name{display:block;font-size:14px;color:var(--cream);font-family:'Cormorant Garamond',serif;letter-spacing:.03em}
.hrf-venue-desc{display:block;font-size:10px;color:rgba(245,240,232,.4);margin-top:2px;letter-spacing:.05em}
.hrf-confirmation{text-align:center;padding:40px 20px}
.hrf-conf-icon{width:56px;height:56px;border-radius:50%;background:rgba(42,80,48,.4);border:2px solid rgba(143,204,143,.4);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:24px;color:#8fcc8f}
.hrf-conf-title{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--cream);margin-bottom:12px}
.hrf-conf-detail{font-size:14px;color:rgba(245,240,232,.55);line-height:1.8;margin-bottom:16px}
.hrf-conf-note{font-size:11px;color:rgba(245,240,232,.3);line-height:1.7;font-style:italic}
/* ── STAFF DASHBOARD ── */
.staff-header{border-bottom:1px solid rgba(184,151,106,.2);padding:20px 28px;display:flex;flex-direction:column;align-items:flex-start;gap:14px}
#reg-event-filter option,#pair-event-filter option{background:#1e3a20;color:#f5f0e8;}
/* ── PAIRING BUILDER ── */
.pair-section{display:flex;gap:16px;min-height:400px;}
@media(max-width:700px){.pair-section{flex-direction:column;}}
.pair-col{flex:1;min-width:0;}
.pair-col-head{font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.pair-player-row{display:flex;align-items:center;gap:6px;padding:5px 8px;background:rgba(255,255,255,.03);border:1px solid rgba(184,151,106,.12);border-radius:2px;margin-bottom:4px;cursor:pointer;transition:all .15s;}
.pair-player-row:hover{background:rgba(184,151,106,.08);border-color:rgba(184,151,106,.3);}
.pair-player-row.swap-source{background:rgba(184,151,106,.18);border-color:var(--gold);}
.pair-tier{width:18px;height:18px;border-radius:50%;font-size:9px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tier-a{background:#2e7d32;color:#fff;}.tier-b{background:#1565c0;color:#fff;}.tier-c{background:#6a1f8a;color:#fff;}.tier-d{background:#b8600a;color:#fff;}
.pair-name{flex:1;font-size:12px;color:var(--cream);}
.pair-hcap{font-size:11px;color:rgba(245,240,232,.45);width:36px;text-align:right;}
.pair-team-card{background:rgba(255,255,255,.03);border:1px solid rgba(184,151,106,.15);border-radius:2px;margin-bottom:8px;overflow:hidden;}
.pair-team-head{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:rgba(184,151,106,.07);border-bottom:1px solid rgba(184,151,106,.1);}
.pair-team-num{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);}
.pair-team-total{font-size:11px;color:rgba(245,240,232,.45);}
.pair-team-body{padding:4px 6px;}
.pair-ctrl{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center;}
.pair-btn{padding:6px 14px;font-size:10px;letter-spacing:.12em;text-transform:uppercase;background:transparent;color:rgba(245,240,232,.6);border:1px solid rgba(184,151,106,.3);cursor:pointer;font-family:'Raleway',sans-serif;transition:all .2s;white-space:nowrap;}
.pair-btn:hover{background:rgba(184,151,106,.1);color:var(--cream);border-color:rgba(184,151,106,.5);}
.pair-btn.active{background:rgba(184,151,106,.15);color:var(--gold-lt);border-color:var(--gold);}
.pair-btn.primary{background:var(--gold);color:var(--deep);border-color:var(--gold);}
.pair-btn.primary:hover{background:var(--gold-lt);}
.pair-input{background:rgba(255,255,255,.05);border:1px solid rgba(184,151,106,.25);color:var(--cream);padding:5px 8px;font-size:12px;font-family:'Raleway',sans-serif;}
.pair-input::placeholder{color:rgba(245,240,232,.3);}
.pair-balance{font-size:11px;color:rgba(245,240,232,.4);padding:4px 0;}
.pair-swap-hint{font-size:10px;color:var(--gold);padding:4px 8px;background:rgba(184,151,106,.1);border:1px solid rgba(184,151,106,.25);border-radius:2px;display:none;}
.pair-swap-hint.show{display:inline-block;}
/* ── TEE SHEET TABLE ── */
.ts-table{width:100%;border-collapse:collapse;}
.ts-table th{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(245,240,232,.35);padding:6px 8px;border-bottom:1px solid rgba(184,151,106,.15);text-align:left;white-space:nowrap;}
.ts-table td{padding:9px 8px;border-bottom:1px solid rgba(255,255,255,.06);vertical-align:middle;color:var(--cream);}
.ts-table tr:hover td{background:rgba(255,255,255,.02);}
.ts-time{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--gold-lt);white-space:nowrap;}
.ts-hole{font-size:11px;color:rgba(245,240,232,.45);white-space:nowrap;}
.ts-group{font-size:11px;color:rgba(245,240,232,.5);white-space:nowrap;}
.ts-score-input{background:rgba(255,255,255,.06);border:1px solid rgba(184,151,106,.2);color:var(--cream);padding:3px 6px;font-size:12px;width:70px;font-family:'Raleway',sans-serif;text-align:center;border-radius:1px;}
.ts-score-input:focus{outline:none;border-color:var(--gold);}
.pair-couple-card{padding:6px 8px;background:rgba(255,255,255,.03);border:1px solid rgba(184,151,106,.12);border-radius:2px;margin-bottom:5px;}
.pair-repeat-warn{font-size:10px;color:#e07070;background:rgba(224,112,112,.08);border-bottom:1px solid rgba(224,112,112,.15);padding:3px 10px;letter-spacing:.05em;}
.ghin-ok{font-size:.6rem;color:#4ade80;background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.25);border-radius:2px;padding:1px 5px;margin-left:5px;white-space:nowrap;}
.ghin-flag{font-size:.6rem;color:#f87171;background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.35);border-radius:2px;padding:1px 5px;margin-left:5px;white-space:nowrap;cursor:pointer;font-weight:700;}
.ghin-unknown{font-size:.6rem;color:rgba(245,240,232,.25);border:1px solid rgba(245,240,232,.1);border-radius:2px;padding:1px 5px;margin-left:5px;white-space:nowrap;}
.pair-history-entry{background:rgba(255,255,255,.02);border:1px solid rgba(184,151,106,.1);border-radius:2px;margin-bottom:6px;overflow:hidden;}
.pair-history-head{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;cursor:pointer;user-select:none;}
.pair-history-head:hover{background:rgba(255,255,255,.03);}
.pair-history-date{font-size:11px;color:var(--gold-lt);}
.pair-history-meta{font-size:10px;color:rgba(245,240,232,.35);}
.pair-history-body{padding:6px 10px 8px;border-top:1px solid rgba(184,151,106,.08);display:none;}
.pair-history-body.open{display:block;}
.pair-history-group{font-size:11px;color:rgba(245,240,232,.55);padding:2px 0;}
.staff-tag{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.staff-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:400;color:var(--cream);letter-spacing:.02em}
.staff-title em{font-style:italic;color:var(--gold-lt);font-weight:300}
.staff-views{display:flex;gap:6px;flex-wrap:wrap;width:100%;align-items:center;}
.staff-view-btn{padding:7px 14px;font-size:10px;letter-spacing:.12em;text-transform:uppercase;background:transparent;color:rgba(245,240,232,.5);border:1px solid rgba(184,151,106,.25);cursor:pointer;font-family:'Raleway',sans-serif;transition:all .2s;white-space:nowrap;}
.staff-view-btn.active{background:var(--gold);color:var(--deep)}
.staff-view-btn.active-view{background:rgba(184,151,106,.15);border-color:var(--gold);color:var(--gold-lt)}
/* Staff dropdown nav */
.sv-dropdown{position:relative;}
.sv-drop-btn{padding:7px 14px;font-size:10px;letter-spacing:.12em;text-transform:uppercase;background:transparent;color:rgba(245,240,232,.6);border:1px solid rgba(184,151,106,.25);cursor:pointer;font-family:'Raleway',sans-serif;transition:all .2s;white-space:nowrap;}
.sv-drop-btn.has-active{background:rgba(184,151,106,.15);border-color:var(--gold);color:var(--gold-lt);}
.sv-drop-menu{display:none;position:absolute;top:calc(100% + 4px);left:0;background:#1c2e21;border:1px solid rgba(184,151,106,.3);z-index:200;min-width:170px;box-shadow:0 8px 24px rgba(0,0,0,.4);}
.sv-drop-menu.open{display:block;}
.sv-drop-menu button{display:block;width:100%;padding:9px 16px;font-size:10px;letter-spacing:.12em;text-transform:uppercase;background:none;border:none;border-bottom:1px solid rgba(184,151,106,.1);color:rgba(245,240,232,.6);cursor:pointer;font-family:'Raleway',sans-serif;text-align:left;transition:background .15s;}
.sv-drop-menu button:last-child{border-bottom:none;}
.sv-drop-menu button:hover{background:rgba(184,151,106,.12);color:var(--gold-lt);}
.sv-drop-menu button.active-view{background:rgba(184,151,106,.18);color:var(--gold-lt);}
/* Hide public nav links in staff mode */
nav.staff-mode .nav-links,nav.staff-mode .nav-cta,nav.staff-mode .nav-hamburger{display:none!important;}
nav.staff-mode .nav-site-back{display:flex!important;}
.nav-site-back{display:none;align-items:center;gap:6px;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:rgba(245,240,232,.5);cursor:pointer;background:none;border:1px solid rgba(184,151,106,.2);padding:7px 14px;font-family:'Raleway',sans-serif;transition:all .2s;}
.nav-site-back:hover{color:var(--gold-lt);border-color:var(--gold);}
@media(max-width:600px){
  .staff-header{padding:14px 16px}
  .staff-view-btn{padding:5px 10px;font-size:9px;letter-spacing:.08em}
  .sv-drop-btn{padding:5px 10px;font-size:9px;letter-spacing:.08em}
}
.staff-layout{display:flex;min-height:calc(100vh - 160px)}
.staff-left{flex:1 1 420px;padding:24px;border-right:1px solid rgba(184,151,106,.12);overflow:auto}
.staff-right{flex:1 1 380px;padding:24px;overflow:auto;max-width:520px}
.staff-cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.staff-cal-month{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--cream);letter-spacing:.05em}

.staff-legend{margin-top:16px;display:flex;gap:16px;flex-wrap:wrap;font-size:10px;color:rgba(245,240,232,.4)}

.staff-add-btn{padding:8px 16px;font-size:10px;letter-spacing:.12em;text-transform:uppercase;background:var(--gold);color:var(--deep);border:none;cursor:pointer;font-family:'Raleway',sans-serif}
.staff-cancel-btn{padding:10px 16px;font-size:10px;letter-spacing:.15em;text-transform:uppercase;background:transparent;color:rgba(245,240,232,.5);border:1px solid rgba(184,151,106,.2);cursor:pointer;font-family:'Raleway',sans-serif}
.staff-time-group{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);padding:8px 0 6px;border-bottom:1px solid rgba(184,151,106,.12);margin-top:12px}
.staff-res-card{background:rgba(255,255,255,.03);border:1px solid rgba(184,151,106,.1);padding:12px 14px;margin-top:6px}

.staff-res-guest-tag{font-size:8px;letter-spacing:.1em;color:var(--gold-lt);text-transform:uppercase;border:1px solid rgba(212,180,131,.3);padding:1px 5px;margin-left:8px}
.staff-res-meta{font-size:11px;color:rgba(245,240,232,.35);margin-top:2px}
.staff-res-notes{font-size:11px;color:rgba(245,240,232,.3);margin-top:4px;font-style:italic;line-height:1.5}
.staff-res-status{font-size:8px;letter-spacing:.12em;text-transform:uppercase;padding:3px 8px;display:inline-block}
.staff-res-actions{display:flex;gap:5px;margin-top:8px;border-top:1px solid rgba(184,151,106,.08);padding-top:8px}
.staff-mini-btn{padding:4px 10px;font-size:8px;letter-spacing:.1em;text-transform:uppercase;font-family:'Raleway',sans-serif;cursor:pointer;transition:all .15s;background:rgba(255,255,255,.05);color:rgba(245,240,232,.45);border:1px solid rgba(184,151,106,.12)}
.staff-mini-btn.accent{background:rgba(42,80,48,.5);color:#8fcc8f;border-color:rgba(42,80,48,.6)}
.staff-mini-btn.danger{background:rgba(100,40,40,.4);color:#cc8888;border-color:rgba(100,40,40,.5)}
.staff-stats{border-top:1px solid rgba(184,151,106,.12);padding:12px 28px;display:flex;gap:32px;font-size:11px;color:rgba(245,240,232,.35)}
.staff-stats strong{color:var(--gold-lt)}
.staff-search-input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(184,151,106,.2);color:var(--cream);padding:10px 14px;font-family:'Raleway',sans-serif;font-size:13px;outline:none;margin-bottom:16px}
.staff-upcoming-date{font-size:12px;color:var(--gold);margin-top:16px;margin-bottom:4px;letter-spacing:.05em}
@media(max-width:800px){
  .staff-layout{flex-direction:column}
  .staff-right{max-width:100%}
}
/* ── CAPACITY BAR ── */
.staff-cap-bar{margin-bottom:16px;padding:8px 12px;background:rgba(255,255,255,.03);border:1px solid rgba(184,151,106,.1)}
.staff-cap-label{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:rgba(245,240,232,.4);margin-bottom:6px;display:flex;justify-content:space-between}
.staff-cap-track{height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.staff-cap-fill{height:100%;border-radius:3px;transition:width .3s}
.staff-cap-text{font-size:11px;margin-top:4px;display:flex;justify-content:space-between}
/* ── GUEST NOTES ── */
.staff-guest-card{background:rgba(255,255,255,.03);border:1px solid rgba(184,151,106,.1);padding:12px 14px;margin-bottom:6px}
.staff-guest-name{font-size:15px;color:var(--cream)}
.staff-guest-note-text{font-size:12px;color:rgba(245,240,232,.45);margin-top:4px;line-height:1.6}
.staff-guest-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.staff-guest-tag-pill{font-size:8px;letter-spacing:.1em;text-transform:uppercase;padding:2px 8px;border-radius:10px;background:rgba(184,151,106,.15);color:var(--gold-lt)}
.staff-guest-tag-pill.vip{background:rgba(184,151,106,.3);color:#f0d9a0}
.staff-guest-match{background:rgba(184,151,106,.1);border:1px solid rgba(184,151,106,.2);padding:10px 12px;margin-top:8px;font-size:11px;color:var(--gold-lt);line-height:1.6}
.staff-guest-match::before{content:'📋 ';font-size:13px}
/* ── WAITLIST ── */
.staff-wl-card{background:rgba(100,40,40,.1);border:1px solid rgba(204,136,136,.15);padding:10px 12px;margin-top:6px}
.staff-wl-name{font-size:14px;color:#eeb8b8}
.staff-wl-meta{font-size:11px;color:rgba(245,240,232,.35);margin-top:2px}
/* ── PRINT ── */
@media print {
  body *{visibility:hidden}
  #staff-print-sheet,#staff-print-sheet *{visibility:visible}
  #staff-print-sheet{position:fixed;left:0;top:0;width:100%;background:#fff;color:#111;padding:32px;font-family:'Georgia',serif}
  .print-header{text-align:center;border-bottom:2px solid #111;padding-bottom:12px;margin-bottom:20px}
  .print-header h1{font-size:24px;font-weight:400;margin:0}
  .print-header p{font-size:12px;color:#666;margin:4px 0 0}
  .print-section{margin-bottom:16px}
  .print-section h3{font-size:13px;text-transform:uppercase;letter-spacing:.15em;border-bottom:1px solid #ccc;padding-bottom:4px;margin-bottom:8px}
  .print-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px dotted #ddd;font-size:12px}
  .print-row .pr-name{font-weight:600}
  .print-notes{font-size:10px;color:#666;font-style:italic;margin-top:2px}
  .print-cap{text-align:center;font-size:13px;margin-bottom:16px;padding:8px;border:1px solid #ccc}
  .print-footer{text-align:center;font-size:10px;color:#999;margin-top:24px;border-top:1px solid #ccc;padding-top:8px}
}

/* ── LIVE SCORING ── */
.ls-container{max-width:900px;margin:32px auto 0}

.ls-event-name{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--cream)}
.ls-event-meta{font-size:11px;color:rgba(245,240,232,.4);margin-top:2px}
.ls-live-badge{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:#66dd88;background:rgba(42,80,48,.5);padding:6px 14px;border:1px solid rgba(42,80,48,.6);animation:ls-pulse 2s ease-in-out infinite}

.ls-iframe-wrap{position:relative;width:100%;background:#fff;border:1px solid rgba(184,151,106,.15)}

.ls-inactive-icon{font-size:40px;opacity:.4;margin-bottom:12px}
.ls-inactive-title{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--forest);margin-bottom:8px}
.ls-inactive-body{font-size:13px;color:var(--muted);max-width:400px;margin:0 auto;line-height:1.7}
.ls-upcoming{margin-top:20px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.ls-upcoming-chip{font-size:11px;color:var(--forest);background:rgba(184,151,106,.12);border:1px solid rgba(184,151,106,.2);padding:6px 14px;cursor:pointer}
.ls-upcoming-chip:hover{background:rgba(184,151,106,.2)}

.ls-result-link{font-size:12px;color:var(--forest);background:rgba(255,255,255,.6);border:1px solid rgba(42,66,51,.1);padding:6px 12px;text-decoration:none;cursor:pointer;transition:all .15s}

.mcard-desc{font-size:13px;line-height:1.8;color:var(--muted);margin-bottom:24px}
.mcard.featured .mcard-desc{color:rgba(245,240,232,.6)}
.mcard-feats{list-style:none;margin-bottom:32px}
.mcard-feat{font-size:13px;color:var(--muted);padding:7px 0;display:flex;align-items:flex-start;gap:10px;border-bottom:1px solid rgba(26,43,31,.07)}
.mcard-feat:last-child{border-bottom:none}
.mcard-feat::before{content:'';min-width:16px;height:1px;background:var(--gold);margin-top:10px;flex-shrink:0}
.mcard.featured .mcard-feat{color:rgba(245,240,232,.6)}
.btable{width:100%;border-collapse:collapse;min-width:560px}
.btable th{background:var(--forest);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);padding:14px 18px;text-align:left}
.btable th:not(:first-child){text-align:center}
.btable td{padding:13px 18px;border-bottom:1px solid rgba(26,43,31,.07);font-size:13px;color:var(--text)}
.btable tr:hover td{background:rgba(26,43,31,.03)}
.btable td:not(:first-child){text-align:center}
.chk{color:#5aab62;font-size:15px}.dsh{color:rgba(26,43,31,.25)}.prt{color:var(--gold);font-size:12px}
.steps{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin-top:44px;position:relative}
.steps::before{content:'';position:absolute;top:27px;left:12.5%;right:12.5%;height:1px;background:linear-gradient(to right,transparent,var(--gold) 20%,var(--gold) 80%,transparent)}
.step{padding:0 20px;text-align:center}
.step-n{width:54px;height:54px;border:1.5px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-family:'Cormorant Garamond',serif;font-size:21px;color:var(--gold);background:var(--cream);position:relative;z-index:1}
.step-t{font-family:'Cormorant Garamond',serif;font-size:19px;color:var(--forest);margin-bottom:8px}
.step-d{font-size:12px;line-height:1.7;color:var(--muted)}
.faq-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 56px;margin-top:44px}
.faq-item{padding:22px 0;border-bottom:1px solid rgba(26,43,31,.1)}
.faq-q{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--forest);cursor:pointer;display:flex;justify-content:space-between;gap:10px}
.faq-icon{color:var(--gold);font-size:18px;flex-shrink:0;transition:transform .2s}
.faq-a{font-size:13px;line-height:1.8;color:var(--muted);display:none;margin-top:10px}
.faq-item.open .faq-a{display:block}
.faq-item.open .faq-icon{transform:rotate(45deg)}
.join-cta{background:var(--gold);padding:60px 80px;display:flex;align-items:center;justify-content:space-between;gap:40px}
.jcta-txt{font-family:'Cormorant Garamond',serif;font-size:clamp(26px,3vw,40px);color:var(--deep);font-weight:400}
.jcta-txt em{font-style:italic}
.btn-dark{font-family:'Raleway',sans-serif;font-size:11px;letter-spacing:.2em;text-transform:uppercase;background:var(--deep);color:var(--cream);border:none;padding:15px 34px;cursor:pointer;flex-shrink:0;transition:all .25s}
.btn-dark:hover{background:var(--forest)}
/* ══════════════════════════════════════════
   ABOUT PAGE
══════════════════════════════════════════ */
.about-bg{background:linear-gradient(to bottom,rgba(17,26,20,.15) 0%,rgba(17,26,20,.78) 100%),url("images/about-hero.jpg") center/cover}
.about-split{display:grid;grid-template-columns:1fr 1.2fr;gap:80px;align-items:start}
.timeline{position:relative;padding:0 0 0 44px}
.timeline::before{content:'';position:absolute;left:14px;top:0;bottom:0;width:1px;background:linear-gradient(to bottom,var(--gold),transparent)}
.tl-item{position:relative;margin-bottom:40px}
.tl-item:last-child{margin-bottom:0}
.tl-dot{position:absolute;left:-38px;top:5px;width:14px;height:14px;border-radius:50%;border:2px solid var(--gold);background:var(--cream)}
.tl-year{font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:.2em;color:var(--gold);margin-bottom:4px}
.tl-title{font-family:'Cormorant Garamond',serif;font-size:21px;color:var(--forest);margin-bottom:6px}
.tl-body{font-size:13px;line-height:1.8;color:var(--muted)}
.mission-block{background:var(--forest);padding:88px 80px;display:grid;grid-template-columns:1fr 1fr;gap:72px;align-items:center}
.mission-quote{font-family:'Cormorant Garamond',serif;font-size:clamp(26px,3vw,40px);font-style:italic;color:var(--cream);line-height:1.3;position:relative;padding-left:28px}
.mission-quote::before{content:'\201C';position:absolute;left:0;top:-8px;font-size:72px;color:var(--gold);opacity:.4;line-height:1}
.mission-text .eyebrow{color:var(--gold-lt)}.mission-text .eyebrow::after{background:var(--gold-lt)}
.mission-text .sec-title{color:var(--cream)}
.mission-text .sec-body{color:rgba(245,240,232,.55);max-width:100%}
.stats-band{background:var(--gold);padding:56px 80px;display:grid;grid-template-columns:repeat(5,1fr)}
.sbi{text-align:center;border-right:1px solid rgba(17,26,20,.15);padding:0 20px}
.sbi:last-child{border-right:none}
.sbi-n{font-family:'Cormorant Garamond',serif;font-size:46px;font-weight:300;color:var(--deep);line-height:1}
.sbi-n sup{font-size:18px}
.sbi-l{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(17,26,20,.6);margin-top:5px}
.staff-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;margin-top:44px}
.staff-card{text-align:center}
.staff-av{width:96px;height:96px;border-radius:50%;border:2px solid rgba(184,151,106,.3);background:var(--forest);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--gold);font-style:italic}
.staff-name{font-family:'Cormorant Garamond',serif;font-size:19px;color:var(--forest);margin-bottom:3px}
.staff-title{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.staff-bio{font-size:12px;line-height:1.7;color:var(--muted)}
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:60px;margin-top:44px}
.cb{margin-bottom:28px}
.cb-lbl{font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.cb-val{font-family:'Cormorant Garamond',serif;font-size:21px;color:var(--forest)}
.cb-sub{font-size:13px;color:var(--muted);margin-top:2px}
.cf-g{margin-bottom:14px}
.cf-l{display:block;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--forest);opacity:.6;margin-bottom:6px}
.cf-i,.cf-s,.cf-t{width:100%;border:1px solid rgba(26,43,31,.2);background:var(--cream);color:var(--text);padding:10px 13px;font-family:'Raleway',sans-serif;font-size:13px;outline:none;transition:border-color .2s}
.cf-i:focus,.cf-s:focus,.cf-t:focus{border-color:var(--gold)}
.cf-t{resize:vertical;min-height:90px}
.cf-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.map-ph{background:var(--forest);height:260px;display:flex;align-items:center;justify-content:center;color:rgba(184,151,106,.3);font-family:'Cormorant Garamond',serif;font-size:15px;font-style:italic;margin-top:44px}
